<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standard Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e6e6e6;
      margin: 0;
      padding: 30px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .calculator {
      width: 220px;
      background: #d9d9d9;
      border: 1px solid #999;
      padding: 12px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }

    .display {
      width: 100%;
      height: 45px;
      font-size: 28px;
      text-align: right;
      padding: 5px 10px;
      box-sizing: border-box;
      margin-bottom: 10px;
      border: 1px solid #888;
      background: white;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    button {
      height: 36px;
      font-size: 24px;
      border: 1px solid #7f9db9;
      background: linear-gradient(to bottom, #ffffff, #d6e4f7);
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s ease;
    }

    button:hover {
      background: linear-gradient(to bottom, #fefefe, #c5dbf5);
    }

    button:active {
      transform: scale(0.96);
      box-shadow: inset 2px 2px 5px rgba(0,0,0,0.25);
    }

    .feature-btn.active-feature {
      background: linear-gradient(to bottom, #8ec5ff, #4a90e2);
      color: white;
      border: 1px solid #2f66b0;
      box-shadow: inset 2px 2px 6px rgba(0,0,0,0.25), 0 0 8px rgba(74,144,226,0.5);
      font-weight: bold;
    }

    .clear-btn {
      margin-top: 12px;
      width: 100%;
      height: 38px;
      font-size: 18px;
    }

    .info-box {
      margin-top: 20px;
      width: 220px;
      background: white;
      border: 1px solid #999;
      padding: 10px;
      min-height: 90px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
      display: none;
    }

    .info-box h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    .info-box p {
      margin: 4px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>Standard Calculator</h1>

  <div class="calculator">
    <input type="text" id="display" class="display" value="0" readonly />

    <div class="buttons">
      <button onclick="appendNumber('7')">7</button>
      <button onclick="appendNumber('8')">8</button>
      <button onclick="appendNumber('9')">9</button>
      <button onclick="setOperator('+')">+</button>

      <button onclick="appendNumber('4')">4</button>
      <button onclick="appendNumber('5')">5</button>
      <button onclick="appendNumber('6')">6</button>
      <button onclick="setOperator('-')">-</button>

      <button onclick="appendNumber('1')">1</button>
      <button onclick="appendNumber('2')">2</button>
      <button onclick="appendNumber('3')">3</button>
      <button onclick="setOperator('*')">*</button>

      <button id="btnA" class="feature-btn" onclick="showDeveloperInfo()">A</button>
      <button onclick="appendNumber('0')">0</button>
      <button id="btnB" class="feature-btn" onclick="showAppInfo()">B</button>
      <button onclick="setOperator('/')">/</button>

      <div></div>
      <div></div>
      <div></div>
      <button onclick="calculate()">=</button>
    </div>

    <button class="clear-btn" onclick="clearDisplay()">Clear</button>
  </div>

  <div class="info-box" id="infoBox"></div>

  <script>
    let currentInput = "0";
    let firstNumber = null;
    let operator = null;
    let waitingForSecondNumber = false;

    let showDev = false;
    let showApp = false;

    function appendNumber(number) {
      if (currentInput === "Error") return;

      if (waitingForSecondNumber) {
        currentInput = number;
        waitingForSecondNumber = false;
      } else {
        currentInput = currentInput === "0" ? number : currentInput + number;
      }

      updateDisplay();
    }

    function setOperator(nextOperator) {
      if (currentInput === "Error") return;

      const inputValue = parseFloat(currentInput);

      if (firstNumber === null) {
        firstNumber = inputValue;
      } else if (!waitingForSecondNumber) {
        firstNumber = performCalculation(firstNumber, inputValue, operator);
        currentInput = String(firstNumber);

        if (currentInput === "Error") {
          updateDisplay();
          return;
        }

        updateDisplay();
      }

      operator = nextOperator;
      waitingForSecondNumber = true;
    }

    function calculate() {
      if (operator === null || waitingForSecondNumber || currentInput === "Error") return;

      const secondNumber = parseFloat(currentInput);
      const result = performCalculation(firstNumber, secondNumber, operator);

      currentInput = String(result);
      updateDisplay();

      if (currentInput !== "Error") {
        firstNumber = result;
      } else {
        firstNumber = null;
      }

      operator = null;
      waitingForSecondNumber = false;
    }

    function performCalculation(first, second, op) {
      switch (op) {
        case "+":
          return first + second;
        case "-":
          return first - second;
        case "*":
          return first * second;
        case "/":
          return second === 0 ? "Error" : first / second;
        default:
          return second;
      }
    }

    function updateDisplay() {
      document.getElementById("display").value = currentInput;
    }

    function clearDisplay() {
      currentInput = "0";
      firstNumber = null;
      operator = null;
      waitingForSecondNumber = false;

      showDev = false;
      showApp = false;

      document.getElementById("btnA").classList.remove("active-feature");
      document.getElementById("btnB").classList.remove("active-feature");
      document.getElementById("infoBox").style.display = "none";
      document.getElementById("infoBox").innerHTML = "";

      updateDisplay();
    }

    function showDeveloperInfo() {
      showDev = !showDev;
      document.getElementById("btnA").classList.toggle("active-feature");
      updateInfo();
    }

    function showAppInfo() {
      showApp = !showApp;
      document.getElementById("btnB").classList.toggle("active-feature");
      updateInfo();
    }

    function updateInfo() {
      const infoBox = document.getElementById("infoBox");
      let content = "";

      if (showDev) {
        content += `
          <h3>Developer Information</h3>
          <p><strong>Name:</strong> Janrey M. Flores</p>
          <p><strong>Student ID No.:</strong> 2024-0944</p>
          <p><strong>Role:</strong> Student / Web Developer</p>
          <p><strong>Course:</strong> BSCS</p>
        `;
      }

      if (showApp) {
        if (content !== "") content += "<hr>";
        content += `
          <h3>Application Information</h3>
          <p><strong>Title:</strong> Standard Calculator</p>
          <p><strong>Description:</strong> A simple web-based calculator that performs basic arithmetic operations and displays extra information using buttons A and B.</p>
        `;
      }

      if (content === "") {
        infoBox.style.display = "none";
        infoBox.innerHTML = "";
      } else {
        infoBox.style.display = "block";
        infoBox.innerHTML = content;
      }
    }
  </script>

</body>
</html>
